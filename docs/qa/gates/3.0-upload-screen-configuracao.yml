schema: 1
story: '3.0'
gate: CONCERNS
status_reason: >
  AC-01 a AC-09 implementados e verificados. 21 testes unitários passando, ruff e mypy
  limpos, regressão total 336 passed/2 skipped. Arquitetura sólida: separação clara entre
  funções puras (testáveis) e render() (Streamlit). ADR-004 (LGPD) respeitado: campo `nome`
  excluído do dict `alunos` em session_state["batch_config"] e preservado apenas em
  session_state["nomes_por_ra"] para preview/exportação. Aprovado com duas observações
  de baixa severidade: formato BRL usa ponto decimal (`R$ 5.00`) em vez de vírgula
  brasileira (`R$ 5,00`) — cosmético, não funcional; e tratamento de exceções amplo
  (BLE001) em obter_max_cost() e leitura de planilha — mitigado com fallback seguro.
reviewer: Quinn
updated: '2026-05-22T00:00:00Z'
top_issues:
  - id: 'UI-001'
    severity: low
    category: code
    finding: >
      Formato monetário usa ponto como separador decimal (`R$ 5.00`) em vez de vírgula
      brasileira (`R$ 5,00`). AC-04 especifica "formato R$ X,XX" literalmente, sugerindo
      locale pt-BR. Impacto cosmético, não funcional.
    suggested_action: >
      Em iteração futura (Story 3.1+), aplicar formatação locale-aware:
      `f"R$ {custo:.2f}".replace('.', ',')` ou usar `locale.currency()` com `pt_BR.UTF-8`.
      Aplicar consistentemente em metric e warning. Aceitável para MVP.
  - id: 'UI-002'
    severity: low
    category: code
    finding: >
      Dois blocos `except Exception as exc:  # noqa: BLE001` em obter_max_cost() (linha 94)
      e leitura de planilha (linha 173) capturam exceções amplas. Em obter_max_cost o
      fallback é seguro; na leitura de planilha o erro é exibido ao usuário via st.error
      sem stack trace (LGPD-safe), o que é desejável.
    suggested_action: >
      Considerar restringir a (ValueError, KeyError, OSError) na leitura da planilha em
      iteração futura para evitar mascarar bugs lógicos. Não bloqueante.
  - id: 'UI-003'
    severity: low
    category: tests
    finding: >
      `import math` está dentro de `calcular_estimativa()` (linha 84) em vez do topo do
      módulo. Funciona corretamente, mas viola PEP 8 e dificulta análise estática.
    suggested_action: >
      Mover `import math` para o bloco de imports no topo do arquivo. Trivial.
