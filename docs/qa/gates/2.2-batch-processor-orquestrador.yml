top_issues:
  - id: 'MNT-004'
    severity: low
    finding: '_get_max_cost_brl() captura `(ValueError, TypeError, AttributeError, FileNotFoundError, Exception)` — `Exception` torna os tipos anteriores redundantes (já com `# noqa: BLE001`).'
    suggested_action: 'Simplificar para `except Exception:` ou usar `contextlib.suppress` em iteração futura. Não bloqueia.'
  - id: 'ARCH-001'
    severity: low
    finding: 'Sequência `inicializar_banco() → limpar_banco() → inicializar_banco()` em processar_batch() linha 298-300 contém uma chamada inicial possivelmente redundante (init é idempotente; a chamada após limpar já basta).'
    suggested_action: 'Avaliar remoção da primeira chamada em refator futuro — comportamento atual é seguro.'
  - id: 'REL-001'
    severity: low
    finding: '_db_write_lock é módulo-scoped — serializa escritas globalmente entre processar_batch() concorrentes. Para sqlite3 com WAL mode é o comportamento correto, mas merece comentário explicando o trade-off.'
    suggested_action: 'Documentar no docstring de _db_write_lock que a serialização é global por design.'
